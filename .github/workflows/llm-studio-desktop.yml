name: LLM Studio Desktop

on:
  pull_request:
    paths:
      - "apps/llm-studio/**"
      - "model/**"
      - "tokenizer/**"
      - "training/**"
      - "scripts/desktop/**"
      - "docs/llm-studio-desktop-*.md"
      - ".github/workflows/llm-studio-desktop.yml"
  push:
    branches: [main]
    paths:
      - "apps/llm-studio/**"
      - "model/**"
      - "tokenizer/**"
      - "training/**"
      - "scripts/desktop/**"
      - ".github/workflows/llm-studio-desktop.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  desktop-quality:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-aarch64
            shell_binary: apps/llm-studio/desktop/src-tauri/target/release/llm_studio_desktop
          - os: windows-2022
            target: windows-x86_64
            shell_binary: apps/llm-studio/desktop/src-tauri/target/release/llm_studio_desktop.exe
          - os: ubuntu-22.04
            target: linux-x86_64
            shell_binary: apps/llm-studio/desktop/src-tauri/target/release/llm_studio_desktop
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            apps/llm-studio/web/package-lock.json
            apps/llm-studio/desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/llm-studio/api/requirements-dev.txt
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          components: rustfmt, clippy
      - name: Install Linux Tauri build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install dependencies
        run: |
          python -m pip install -r apps/llm-studio/api/requirements-dev.txt
          cargo install cargo-audit --locked --version 0.22.1
          cargo install cargo-auditable --locked --version 0.7.4
          npm ci --prefix apps/llm-studio/web
          npm ci --prefix apps/llm-studio/desktop
      - name: Dependency audit
        run: |
          npm audit --audit-level=high --prefix apps/llm-studio/web
          npm audit --audit-level=high --prefix apps/llm-studio/desktop
      - name: Web quality and offline static output
        env:
          npm_config_offline: "true"
        run: |
          npm run lint --prefix apps/llm-studio/web
          npm run typecheck --prefix apps/llm-studio/web
          npm run test:regression --prefix apps/llm-studio/web
          npm run build:desktop --prefix apps/llm-studio/web
          python scripts/desktop/audit_release_payload.py apps/llm-studio/web/out
      - name: API tests
        working-directory: apps/llm-studio/api
        run: python -m pytest -q
      - name: Frozen API contract catalog
        run: python scripts/desktop/validate_api_contract_fixtures.py
      - name: Build and smoke target-native characterization runtime
        run: |
          python scripts/desktop/build_runtime.py --portable --install-dependencies --allow-unlocked-development --output "build/desktop/runtime/${{ matrix.target }}"
          python scripts/desktop/smoke_runtime.py "build/desktop/runtime/${{ matrix.target }}" --performance-report "build/desktop/release/performance-characterization-${{ matrix.target }}.json"
          python scripts/desktop/audit_dependencies.py --python "build/desktop/runtime/${{ matrix.target }}/${{ runner.os == 'Windows' && 'python/Scripts/python.exe' || 'python/bin/python' }}"
          python scripts/desktop/release_manifest.py "build/desktop/runtime/${{ matrix.target }}/manifest.json" --output "build/desktop/release/${{ matrix.target }}"
        shell: bash
      - name: Upload target-native characterization evidence
        uses: actions/upload-artifact@v4
        with:
          name: desktop-characterization-${{ matrix.target }}
          path: build/desktop/release/performance-characterization-${{ matrix.target }}.json
          if-no-files-found: error
      - name: Rust format, lint, and tests
        run: |
          npm run fmt:check --prefix apps/llm-studio/desktop
          npm run clippy --prefix apps/llm-studio/desktop
          npm test --prefix apps/llm-studio/desktop
          python scripts/desktop/build_shell.py --no-bundle
          python scripts/desktop/audit_dependencies.py --skip-python --cargo-binary "${{ matrix.shell_binary }}"
          python scripts/desktop/audit_release_payload.py "${{ matrix.shell_binary }}"
